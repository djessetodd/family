<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom and Dad's Excellent Adventure</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Mom and Dad's Excellent Adventure</h1>

        <div class="destinations">
            <h2>Destinations</h2>
            <ul>
                <li>Austria or Germany</li>
                <li>Italy</li>
                <li>France</li>
                <li>Spain</li>
                <li>Greece</li>
                <li>Portugal</li>
                <li>Switzerland</li>
                <li>Netherlands</li>
            </ul>
        </div>

        <div class="activities">
            <h2>Activities</h2>
            <button>Crafts (pottery, painting, woodworking)</button>
            <button>Music (live music, playing instruments)</button>
            <button>Hiking</button>
            <button>Cooking Classes</button>
            <button>Cultural Tours</button>
            <button>Cycling</button>
            <button>Wine Tastings</button>
            <button>Beach Days</button>
            <button>Fishing</button>
            <button>Shopping</button>
            <button>Photography</button>
            <button>Relaxation</button>
        </div>

        <div class="ratings">
            <h2>Your Ratings</h2>
            <div class="heart-rating">❤️❤️❤️❤️❤️</div>
        </div>

        <div class="month-grid">
            <h2>Select a Month</h2>
            <div class="grid">
                <!-- Create a grid layout for months -->
            </div>
        </div>

        <div class="vibe-sliders">
            <h2>Vibe Selection</h2>
            <input type="range" min="1" max="5" value="3" /> <!-- Slider for vibe -->
        </div>
    </div>

    <script>
        // Store data in localStorage
        localStorage.setItem('momdadAdventure', JSON.stringify({
            destinations: [...],
            activities: [...],
        }));

        // Confetti animation
        function showConfetti() {
            // Trigger confetti animation
        }
    </script>
</body>
</html>
